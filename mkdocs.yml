site_name: Homelab HQ
site_url: https://homelab.debdut.in/
site_description: Documentation for a private, zero-trust homelab infrastructure.
site_author: Debdut Goswami

repo_url: https://github.com/homelab-hq/docs
repo_name: homelab-hq/docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.mermaid_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Security Model: security.md
  - Infrastructure:
      - Overview: infrastructure/overview.md
      - Networking & VPN: infrastructure/tailscale.md
      - Reverse Proxy: infrastructure/nginx.md
  - Services:
      - Monitoring: services/monitoring.md
      - Media & Streaming: services/media.md
      - Automation: services/automation.md
  - Operations:
      - Management: operations/makefile.md
      - Troubleshooting: operations/troubleshooting.md
